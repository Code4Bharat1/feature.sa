<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Alliance – Experience The Technology</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sa-navy:#1B1F6B;--sa-green:#1A7A3C;--sa-red:#CC2222;--sa-white:#ffffff;--sa-light:#f0f4fb}
body{font-family:"Inter",sans-serif;background:var(--sa-light);min-height:100vh;display:flex;flex-direction:column;align-items:center}
.banner{width:100%;background:var(--sa-navy);color:#fff;text-align:center;padding:16px 20px 32px;font-family:"Poppins",sans-serif;font-size:clamp(.9rem,2.6vw,1.35rem);font-weight:800;letter-spacing:2px;text-transform:uppercase;clip-path:polygon(0 0,100% 0,100% 78%,50% 100%,0 78%);position:relative;overflow:hidden}
.banner::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 18px,rgba(255,255,255,.04) 18px,rgba(255,255,255,.04) 19px)}
.banner-inner{position:relative;z-index:1}
.banner-inner small{display:block;font-size:.58em;letter-spacing:3px;color:#f87171;font-weight:600;margin-top:5px}
.logo-section{margin:28px auto 8px;background:#fff;padding:14px 30px;border-radius:18px;box-shadow:0 4px 22px rgba(27,31,107,.1);border-top:4px solid var(--sa-green);border-bottom:4px solid var(--sa-red)}
.logo-section img{height:72px;width:auto;display:block}
.scan-wrap{margin:20px auto 4px;text-align:center}
.scan-label{font-family:"Poppins",sans-serif;font-size:1.15rem;font-weight:700;color:var(--sa-red);font-style:italic;margin-bottom:14px}
.qr-card{display:inline-block;background:#fff;border-radius:18px;padding:14px;box-shadow:0 6px 28px rgba(27,31,107,.14);border:3px solid var(--sa-green);position:relative}
.qr-corner{position:absolute;width:18px;height:18px;border-color:var(--sa-red);border-style:solid}
.qr-corner.tl{top:5px;left:5px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.qr-corner.tr{top:5px;right:5px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.qr-corner.bl{bottom:5px;left:5px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.qr-corner.br{bottom:5px;right:5px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.grid{width:100%;max-width:660px;padding:22px 18px 8px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.btn{position:relative;background:var(--sa-navy);color:#fff;border:none;border-radius:36px;padding:18px 10px 16px;font-family:"Poppins",sans-serif;font-size:.74rem;font-weight:700;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(27,31,107,.3);min-height:76px;line-height:1.3;display:flex;align-items:center;justify-content:center;text-align:center;border-bottom:3px solid rgba(255,255,255,.1)}
.btn:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(27,31,107,.42);background:#14186a}
.btn:active{transform:scale(.97)}
.btn.green-btn{background:var(--sa-green)}.btn.green-btn:hover{background:#145e2e}
.btn.red-btn{background:var(--sa-red)}.btn.red-btn:hover{background:#a81c1c}
.check{position:absolute;top:-11px;right:-7px;width:28px;height:28px;background:#16a34a;border-radius:50%;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center}
.check svg{width:12px;height:12px}
.tagline{margin:4px auto 24px;font-size:.74rem;color:#6b7280;text-align:center}
.overlay{display:none;position:fixed;inset:0;background:rgba(5,8,40,.87);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:22px;width:min(94vw,620px);overflow:hidden;animation:pop .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
.modal::before{content:"";display:block;height:4px;background:linear-gradient(90deg,var(--sa-green) 0%,var(--sa-navy) 50%,var(--sa-red) 100%)}
.m-head{background:var(--sa-navy);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.m-hl{display:flex;align-items:center;gap:10px}
.m-ico{width:36px;height:36px;background:rgba(255,255,255,.13);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.m-ico svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.m-title{font-family:"Poppins",sans-serif;font-size:.82rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.5px}
.m-badge{font-size:.56rem;background:#1A7A3C;color:#fff;padding:3px 9px;border-radius:20px;font-weight:700;letter-spacing:.5px;white-space:nowrap;border:1px solid rgba(255,255,255,.2)}
.m-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.m-close:hover{background:rgba(255,255,255,.3)}
.m-vid{width:100%;aspect-ratio:16/9;background:#000}
.m-vid iframe{width:100%;height:100%;border:none;display:block}
.vid-ph{width:100%;aspect-ratio:16/9;background:var(--sa-navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#fff}
.play-ring{width:64px;height:64px;border:2.5px solid rgba(255,255,255,.35);border-radius:50%;display:flex;align-items:center;justify-content:center}
.play-ring svg{width:28px;height:28px;fill:#fff;margin-left:4px}
.vid-ph h3{font-family:"Poppins",sans-serif;font-size:.9rem;font-weight:700;text-align:center;padding:0 24px;color:rgba(255,255,255,.92)}
.vid-ph p{font-size:.72rem;color:rgba(255,255,255,.45);text-align:center;padding:0 20px}
.m-desc{padding:13px 18px 17px;font-size:.82rem;color:#4b5563;line-height:1.6;display:flex;align-items:flex-start;gap:10px;border-top:1px solid #e5e7eb}
.m-desc svg{width:18px;height:18px;flex-shrink:0;margin-top:1px;fill:var(--sa-green)}
footer{margin-top:auto;padding:14px;font-size:.72rem;color:#9ca3af;text-align:center}
@media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr);gap:12px;padding:16px 12px}.btn{font-size:.67rem;min-height:66px}}
</style>
</head>
